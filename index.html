<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stillness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #888;
      --bg: #e8e8e8;
      --btn-bg: #f0f0f0;
      --btn-playing-bg: #2a2a2a;
      --btn-playing-color: #e8e8e8;
      --ring-track-color: rgba(0,0,0,0.06);
    }

    :root.dark {
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --bg: #1a1a1a;
      --btn-bg: #2a2a2a;
      --btn-playing-bg: #f0f0f0;
      --btn-playing-color: #1a1a1a;
      --ring-track-color: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s ease;
    }

    .wheel-container {
      position: fixed;
      bottom: -22vh;
      left: 50%;
      transform: translateX(-50%);
      width: 200vw;
      height: 200vw;
      pointer-events: none;
    }

    stillness-ring {
      --ring-size: 100vh;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 2rem 1rem 1rem;
      text-align: center;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    .header.dimmed {
      opacity: 0.4;
    }

    .header h1 {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .selection {
      font-size: 0.9rem;
      color: var(--text-primary);
      min-height: 1.5rem;
    }

    .selection span { 
      display: inline-block; 
      cursor: pointer;
      padding: 0.25rem 0.1rem;
      transition: opacity 0.2s;
    }

    .selection span:active {
      opacity: 0.5;
    }

    .selection .sep { 
      margin: 0 0.4rem; 
      color: var(--text-muted); 
      cursor: default;
    }

    .selection .sep:active {
      opacity: 1;
    }

    .timer {
      font-size: 3rem;
      font-weight: 200;
      color: var(--text-primary);
      margin-top: 1rem;
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .timer.visible {
      opacity: 1;
    }

    .btn {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid var(--ring-track-color);
      background: var(--btn-bg);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .btn:active { transform: translateX(-50%) scale(0.95); }
    
    .btn.playing {
      background: var(--btn-playing-bg);
      color: var(--btn-playing-color);
      opacity: 0.6;
    }

    .btn.breathing {
      animation: breathe 4s ease-in-out infinite;
    }

    .btn.paused {
      opacity: 0.8;
      animation: none;
    }

    @keyframes breathe {
      0%, 100% { 
        opacity: 0.5;
        transform: translateX(-50%) scale(1);
      }
      50% { 
        opacity: 0.7;
        transform: translateX(-50%) scale(1.03);
      }
    }

    .btn.pressing {
      transform: translateX(-50%) scale(0.9);
      transition: transform 0.5s ease;
    }

    .hint {
      position: fixed;
      bottom: 7rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .hint.hidden { opacity: 0; }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 2rem;
      height: 2rem;
      border: none;
      background: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .theme-toggle:hover {
      opacity: 0.8;
    }

    .theme-toggle.dimmed {
      opacity: 0.2;
    }

    .theme-toggle svg {
      width: 100%;
      height: 100%;
      fill: var(--text-muted);
      transition: fill 0.3s;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }

    :root.dark .theme-toggle .sun { display: block; }
    :root.dark .theme-toggle .moon { display: none; }
  </style>
</head>
<body>

<div class="header" id="header">
  <h1>Stillness</h1>
  <div class="selection" id="selection"></div>
  <div class="timer" id="timer"></div>
</div>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
</button>

<div class="wheel-container">
  <stillness-ring id="ringMode"></stillness-ring>
  <stillness-ring id="ringAmbiance"></stillness-ring>
  <stillness-ring id="ringTime"></stillness-ring>
</div>

<button class="btn" id="btn">Select</button>
<div class="hint" id="hint">Select mode</div>

<script>
// ==============================
// <stillness-ring> Component
// ==============================

const ringTemplate = document.createElement('template');
ringTemplate.innerHTML = `
<style>
  :host {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(50%);
    border-radius: 50%;
    width: var(--ring-size, 100vh);
    height: var(--ring-size, 100vh);
    opacity: 0;
    pointer-events: none;
    transition:
      opacity 0.5s ease,
      width 0.6s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  :host([active]) {
    opacity: 1;
    pointer-events: auto;
  }

  .track {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--ring-track-color, rgba(0,0,0,0.06));
  }

  .items {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .item {
    position: absolute;
    top: 50%;
    left: 50%;
    cursor: pointer;
    transition: opacity 0.4s ease;
  }

  .item-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.5rem;
  }

  .item-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary, #4a4a4a);
    white-space: nowrap;
    transition: color 0.3s, transform 0.3s;
  }

  .item.highlighted .item-label {
    color: var(--text-primary, #1a1a1a);
    transform: scale(1.15);
  }

  .item-value {
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--text-secondary, #4a4a4a);
    line-height: 1;
    transition: color 0.3s, font-weight 0.3s;
  }

  .item.highlighted .item-value {
    color: var(--text-primary, #1a1a1a);
    font-weight: 400;
  }

  .item-unit {
    font-size: 0.5rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted, #888);
  }
</style>
<div class="track"></div>
<div class="items"></div>
`;

class StillnessRing extends HTMLElement {
  static get observedAttributes() { return ['active']; }

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this.shadowRoot.appendChild(ringTemplate.content.cloneNode(true));

    this._items = [];
    this._rotation = 0;
    this._highlightedIndex = 0;
    this._selectedIndex = null;

    this._dragging = false;
    this._moved = false;
    this._startX = 0;
    this._startRotation = 0;
    this._velocity = 0;
    this._lastX = 0;
    this._lastTime = 0;
    this._lastHighlight = 0;

    this._itemsEl = this.shadowRoot.querySelector('.items');

    this._onMove = this._onDragMove.bind(this);
    this._onEnd = this._onDragEnd.bind(this);

    this._itemsEl.addEventListener('mousedown', e => this._onDragStart(e));
    this._itemsEl.addEventListener('touchstart', e => this._onDragStart(e), { passive: true });
  }

  connectedCallback() {
    document.addEventListener('mousemove', this._onMove);
    document.addEventListener('touchmove', this._onMove, { passive: true });
    document.addEventListener('mouseup', this._onEnd);
    document.addEventListener('touchend', this._onEnd);
  }

  disconnectedCallback() {
    document.removeEventListener('mousemove', this._onMove);
    document.removeEventListener('touchmove', this._onMove);
    document.removeEventListener('mouseup', this._onEnd);
    document.removeEventListener('touchend', this._onEnd);
  }

  get items() { return this._items; }
  set items(val) {
    this._items = Array.isArray(val) ? val : [];
    this._rotation = 0;
    this._highlightedIndex = 0;
    this._render();
  }

  get highlightedIndex() { return this._highlightedIndex; }
  get highlightedItem() { return this._items[this._highlightedIndex] || null; }
  get selectedIndex() { return this._selectedIndex; }
  get selectedItem() { return this._selectedIndex !== null ? this._items[this._selectedIndex] : null; }

  get active() { return this.hasAttribute('active'); }
  set active(val) { val ? this.setAttribute('active', '') : this.removeAttribute('active'); }

  get _anglePerItem() { return this._items.length ? 360 / this._items.length : 360; }

  attributeChangedCallback() { requestAnimationFrame(() => this._recalcPositions()); }

  _render() {
    this._itemsEl.innerHTML = '';
    const anglePerItem = this._anglePerItem;
    
    this._items.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.index = i;

      const content = document.createElement('div');
      content.className = 'item-content';
      
      const baseAngle = i * anglePerItem - 90;
      content.style.transform = 'rotate(' + (baseAngle + 90) + 'deg)';

      if (item.value != null) {
        content.innerHTML = '<span class="item-value">' + item.value + '</span><span class="item-unit">' + (item.unit || 'min') + '</span>';
      } else {
        content.innerHTML = '<span class="item-label">' + (item.label || item.id) + '</span>';
      }

      el.appendChild(content);
      el.addEventListener('click', () => this._onItemClick(i));
      this._itemsEl.appendChild(el);
    });

    this._recalcPositions();
    this._updateClasses();
    this._applyRotation(false);
  }

  _recalcPositions() {
    const radius = this._getRadius();
    const anglePerItem = this._anglePerItem;
    this._itemsEl.querySelectorAll('.item').forEach((el, i) => {
      const baseAngle = i * anglePerItem - 90;
      const a = baseAngle * Math.PI / 180;
      el.style.transform = 'translate(calc(-50% + ' + (Math.cos(a) * radius) + 'px), calc(-50% + ' + (Math.sin(a) * radius) + 'px))';
    });
  }

  _getRadius() {
    const w = this.offsetWidth;
    return w ? w / 2 : window.innerHeight * 0.5;
  }

  _updateClasses() {
    this._itemsEl.querySelectorAll('.item').forEach((el, i) => {
      el.classList.toggle('highlighted', i === this._highlightedIndex);
      el.classList.toggle('selected', i === this._selectedIndex);
    });
  }

  _applyRotation(animate) {
    const t = animate ? 'transform 0.5s cubic-bezier(0.4,0,0.2,1)' : 'none';
    this._itemsEl.style.transition = t;
    this._itemsEl.style.transform = 'rotate(' + this._rotation + 'deg)';
  }

  _onDragStart(e) {
    if (!this.active) return;
    this._dragging = true;
    this._moved = false;
    this._startX = e.touches ? e.touches[0].clientX : e.clientX;
    this._startRotation = this._rotation;
    this._velocity = 0;
    this._lastX = this._startX;
    this._lastTime = Date.now();
    this._lastHighlight = this._highlightedIndex;
    this._applyRotation(false);
  }

  _onDragMove(e) {
    if (!this._dragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const dx = x - this._startX;
    if (Math.abs(dx) > 3) this._moved = true;

    this._rotation = this._startRotation + dx * 0.4;

    const now = Date.now();
    const dt = now - this._lastTime;
    if (dt > 0) this._velocity = (x - this._lastX) / dt;
    this._lastX = x;
    this._lastTime = now;

    this._applyRotation(false);
    this._updateHighlightFromRotation();

    if (this._highlightedIndex !== this._lastHighlight) {
      this._emit('highlight-change', { index: this._highlightedIndex, item: this.highlightedItem });
      this._lastHighlight = this._highlightedIndex;
    }
  }

  _onDragEnd() {
    if (!this._dragging) return;
    this._dragging = false;
    if (!this._moved) return;
    this._rotation += this._velocity * 80;
    this._snap();
  }

  _snap() {
    const angle = this._anglePerItem;
    const norm = ((this._rotation % 360) + 360) % 360;
    const step = Math.round(norm / angle) % this._items.length;
    const target = step * angle;

    let diff = target - (this._rotation % 360);
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;

    this._rotation += diff;
    this._highlightedIndex = (this._items.length - step) % this._items.length;

    this._applyRotation(true);
    this._updateClasses();
    this._emit('highlight-change', { index: this._highlightedIndex, item: this.highlightedItem });
  }

  _updateHighlightFromRotation() {
    const angle = this._anglePerItem;
    const norm = ((this._rotation % 360) + 360) % 360;
    const step = Math.round(norm / angle) % this._items.length;
    this._highlightedIndex = (this._items.length - step) % this._items.length;
    this._updateClasses();
  }

  _onItemClick(index) {
    if (!this.active) return;
    const angle = this._anglePerItem;
    const step = (this._items.length - index) % this._items.length;
    const target = step * angle;

    let norm = ((this._rotation % 360) + 360) % 360;
    let diff = target - norm;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;

    this._rotation += diff;
    this._highlightedIndex = index;
    this._applyRotation(true);
    this._updateClasses();
    setTimeout(() => this.confirmSelection(), 300);
  }

  confirmSelection() {
    this._selectedIndex = this._highlightedIndex;
    this._updateClasses();
    this._emit('item-selected', { index: this._selectedIndex, item: this.selectedItem });
  }

  setSelected(index) { this._selectedIndex = index; this._updateClasses(); }
  clearSelected() { this._selectedIndex = null; this._updateClasses(); }
  recalculate() { this._recalcPositions(); this._applyRotation(false); }

  _emit(name, detail) {
    this.dispatchEvent(new CustomEvent(name, { detail: detail || {}, bubbles: true, composed: true }));
  }
}

customElements.define('stillness-ring', StillnessRing);


// ==============================
// App Logic
// ==============================

const MODES = [
  { id: 'focus', label: 'Focus' },
  { id: 'unwind', label: 'Unwind' },
  { id: 'sleep', label: 'Sleep' },
];

const AMBIANCES = [
  { id: 'rain', label: 'Rain' },
  { id: 'forest', label: 'Forest' },
  { id: 'ocean', label: 'Ocean' },
  { id: 'fire', label: 'Fire' },
  { id: 'night', label: 'Night' },
  { id: 'stream', label: 'Stream' },
];

const TIMES = [];
for (var i = 5; i <= 120; i += 5) TIMES.push({ id: 't' + i, value: i });

// State
var level = 1;
var selectedMode = null;
var selectedAmbiance = null;
var selectedTime = null;
var isPlaying = false;
var remainingSeconds = 0;
var timerInterval = null;

// Elements
var rings = [
  document.getElementById('ringMode'),
  document.getElementById('ringAmbiance'),
  document.getElementById('ringTime')
];
var btn = document.getElementById('btn');
var selection = document.getElementById('selection');
var timer = document.getElementById('timer');
var hint = document.getElementById('hint');
var header = document.getElementById('header');
var themeToggle = document.getElementById('themeToggle');

// Init data
rings[0].items = MODES;
rings[1].items = AMBIANCES;
rings[2].items = TIMES;

// Gesture detection: swipe up from bottom area to go back
var swipeStartY = 0;
var swipeStartX = 0;
var swipeStartedInZone = false;

document.addEventListener('touchstart', function(e) {
  swipeStartY = e.touches[0].clientY;
  swipeStartX = e.touches[0].clientX;
  
  // Only track swipes starting from bottom 20% of screen
  var screenHeight = window.innerHeight;
  swipeStartedInZone = swipeStartY > screenHeight * 0.8;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!swipeStartedInZone) return;
  
  var deltaY = swipeStartY - e.changedTouches[0].clientY;
  var deltaX = Math.abs(swipeStartX - e.changedTouches[0].clientX);
  
  // Swipe up: vertical > 60px and 3:1 ratio over horizontal
  if (deltaY > 60 && deltaY > deltaX * 3) {
    if (!isPlaying && level > 1) {
      goBack();
    }
  }
});

// Header tap: jump to specific ring
function setupHeaderTaps() {
  var modeSpan = selection.querySelector('[data-level="1"]');
  var ambianceSpan = selection.querySelector('[data-level="2"]');
  var timeSpan = selection.querySelector('[data-level="3"]');
  
  if (modeSpan) {
    modeSpan.addEventListener('click', function() {
      if (isPlaying) {
        pausePlayback(1);
      } else {
        goToLevel(1);
      }
    });
  }
  if (ambianceSpan) {
    ambianceSpan.addEventListener('click', function() {
      if (isPlaying) {
        pausePlayback(2);
      } else {
        goToLevel(2);
      }
    });
  }
  if (timeSpan) {
    timeSpan.addEventListener('click', function() {
      if (isPlaying) {
        pausePlayback(3);
      } else {
        goToLevel(3);
      }
    });
  }
}

function goToLevel(l) {
  level = l;
  rings.forEach((ring, i) => {
    ring.active = (i === l - 1);
  });
  setTimeout(() => {
    rings.forEach(ring => ring.recalculate());
  }, 50);
  updateUI();
}

function goBack() {
  if (isPlaying) return;
  if (level === 3) { selectedTime = null; goToLevel(2); }
  else if (level === 2) { selectedAmbiance = null; goToLevel(1); }
}

function updateUI() {
  // Header selection with data-level for tap handling
  var parts = [];
  if (selectedMode) parts.push('<span data-level="1">' + selectedMode.label + '</span>');
  if (selectedAmbiance) parts.push('<span data-level="2">' + selectedAmbiance.label + '</span>');
  if (selectedTime) parts.push('<span data-level="3">' + selectedTime.value + ' min</span>');
  selection.innerHTML = parts.join('<span class="sep">·</span>');
  
  // Setup tap handlers on new spans
  setupHeaderTaps();

  // Hint
  var hints = { 1: 'Select mode', 2: 'Select ambiance', 3: 'Select duration' };
  hint.textContent = isPlaying ? '' : (hints[level] || '');
  hint.classList.toggle('hidden', isPlaying);

  // Button (only update if not in paused state)
  if (isPlaying) {
    btn.classList.add('playing');
    // Don't override text here - togglePause manages it
  } else {
    btn.textContent = 'Select';
    btn.classList.remove('playing');
  }

  // Timer display
  timer.classList.toggle('visible', isPlaying);
}

function updateTimer() {
  var mins = Math.floor(remainingSeconds / 60);
  var secs = remainingSeconds % 60;
  timer.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
}

function startPlayback() {
  isPlaying = true;
  remainingSeconds = selectedTime.value * 60;
  
  // Hide all rings
  rings.forEach(ring => ring.active = false);
  
  // Dim UI, start breathing
  header.classList.add('dimmed');
  themeToggle.classList.add('dimmed');
  btn.textContent = 'Pause';
  btn.classList.add('breathing');
  btn.classList.remove('paused');
  
  updateUI();
  updateTimer();
  
  timerInterval = setInterval(function() {
    remainingSeconds--;
    updateTimer();
    
    if (remainingSeconds <= 0) {
      endPlayback();
    }
  }, 1000);
}

function togglePause() {
  if (timerInterval) {
    // Pause
    clearInterval(timerInterval);
    timerInterval = null;
    btn.textContent = 'Resume';
    btn.classList.remove('breathing');
    btn.classList.add('paused');
    header.classList.remove('dimmed');
    themeToggle.classList.remove('dimmed');
  } else {
    // Resume
    btn.textContent = 'Pause';
    btn.classList.add('breathing');
    btn.classList.remove('paused');
    header.classList.add('dimmed');
    themeToggle.classList.add('dimmed');
    timerInterval = setInterval(function() {
      remainingSeconds--;
      updateTimer();
      if (remainingSeconds <= 0) {
        endPlayback();
      }
    }, 1000);
  }
}

function pausePlayback(targetLevel) {
  // Stop timer and return to selection
  clearInterval(timerInterval);
  timerInterval = null;
  isPlaying = false;
  
  // Restore UI
  header.classList.remove('dimmed');
  themeToggle.classList.remove('dimmed');
  btn.classList.remove('breathing', 'paused');
  
  // Go to specified level or default to time selection
  goToLevel(targetLevel || 3);
}

function endPlayback() {
  isPlaying = false;
  clearInterval(timerInterval);
  timerInterval = null;
  remainingSeconds = 0;
  
  // Restore UI
  header.classList.remove('dimmed');
  themeToggle.classList.remove('dimmed');
  btn.classList.remove('breathing', 'paused');
  
  // TODO: Play chime for focus/unwind modes, fade out for sleep
  console.log('✓ Session complete:', selectedMode.label);
  
  // Reset to beginning
  selectedMode = null;
  selectedAmbiance = null;
  selectedTime = null;
  goToLevel(1);
}

// Events
rings[0].addEventListener('item-selected', function(e) {
  selectedMode = e.detail.item;
  goToLevel(2);
});

rings[1].addEventListener('item-selected', function(e) {
  selectedAmbiance = e.detail.item;
  goToLevel(3);
});

rings[2].addEventListener('item-selected', function(e) {
  selectedTime = e.detail.item;
  // Auto-play on duration selection
  startPlayback();
});

// Button: tap = select/pause/resume, long press = edit
var pressTimer = null;
var isLongPress = false;

btn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  isLongPress = false;
  
  if (isPlaying) {
    btn.classList.add('pressing');
    pressTimer = setTimeout(function() {
      isLongPress = true;
      btn.classList.remove('pressing');
      // Long press while playing: go to edit mode
      pausePlayback();
    }, 500);
  }
}, { passive: false });

btn.addEventListener('touchend', function(e) {
  e.preventDefault();
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');
  
  if (isLongPress) return; // Already handled by long press
  
  if (isPlaying) {
    // Tap while playing: toggle pause
    togglePause();
  } else {
    // Tap while selecting: confirm selection
    rings[level - 1].confirmSelection();
  }
});

btn.addEventListener('touchcancel', function() {
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');
});

// Mouse fallback for desktop
btn.addEventListener('mousedown', function() {
  isLongPress = false;
  
  if (isPlaying) {
    btn.classList.add('pressing');
    pressTimer = setTimeout(function() {
      isLongPress = true;
      btn.classList.remove('pressing');
      pausePlayback();
    }, 500);
  }
});

btn.addEventListener('mouseup', function() {
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');
  
  if (isLongPress) return;
  
  if (isPlaying) {
    togglePause();
  } else {
    rings[level - 1].confirmSelection();
  }
});

btn.addEventListener('mouseleave', function() {
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');
});

// Disable context menu on button
btn.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});

// Theme toggle
themeToggle.addEventListener('click', function() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});

// Load saved theme
if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.classList.add('dark');
}

// Start
goToLevel(1);
</script>
</body>
</html>
